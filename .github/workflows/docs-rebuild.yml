name: 'Trigger Docs Rebuild'
on:
  push:
    branches:
      - 'main'
    paths:
      - 'docs/**'
jobs:
  trigger-rebuild:
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Trigger rebuild'
        env:
          DOCS_REBUILD_URL: ${{ secrets.DOCS_REBUILD_URL }}
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${DOCS_REBUILD_URL}"
